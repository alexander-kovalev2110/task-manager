security:
  password_hashers:
    App\Domain\User\User:
      algorithm: auto

  providers:
    app_user_provider:
      entity:
        class: App\Domain\User\User
        property: email

  firewalls:
    dev:
      pattern: ^/(_(profiler|wdt)|css|images|js)/
      security: false

    register:
      pattern: ^/api/register
      stateless: true
      security: false

    login:
      pattern: ^/api/login
      stateless: true
      json_login:
        check_path: /api/login
        username_path: email
        password_path: password

    api:
      pattern: ^/api
      stateless: true
      jwt: ~   # 👈 ВОТ ЭТО КЛЮЧ

  access_control:
    - { path: ^/api/register, roles: PUBLIC_ACCESS }
    - { path: ^/api/login, roles: PUBLIC_ACCESS }
    - { path: ^/api, roles: IS_AUTHENTICATED_FULLY }